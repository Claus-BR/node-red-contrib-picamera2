<!-- Picamera2 TakePhoto -->
<script type="text/x-red" data-template-name="picamera2-takephoto">
	<div class="form-row node-input-filemode">
		 <label for="node-input-filemode"><i class="fa fa-file-image-o"></i> <span data-i18n="picamera2.label.filemode"></span></label>
		 <select id="node-input-filemode">
			<option value="2" data-i18n="picamera2.options.automode"></option>
			<option value="1" data-i18n="picamera2.options.defaultmode"></option>
			<option value="0" data-i18n="picamera2.options.bufferedmode"></option>
		</select>
	</div>
	<div id="autoname" class="form-row node-input-autoname">
		 <label for="node-input-autoname"><i class="fa fa-tag"></i> <span data-i18n="picamera2.label.autoname"></span></label>
		 <input type="text" id="node-input-autoname" data-i18n="[placeholder]picamera2.placeholder.autoname">
	</div>
	<div id="filename" class="form-row node-input-filename">
		 <label for="node-input-filename"><i class="fa fa-tag"></i> <span data-i18n="picamera2.label.filename"></span></label>
		 <input type="text" id="node-input-filename" data-i18n="[placeholder]picamera2.placeholder.filename">
	</div>
	<div id="filepath" class="form-row node-input-filepath">
		 <label for="node-input-filepath"><i class="fa fa-folder"></i> <span data-i18n="picamera2.label.filepath"></span></label>
		 <input type="text" id="node-input-filepath" data-i18n="[placeholder]picamera2.placeholder.filepath">
	</div>
	<div id="fileformat" class="form-row node-input-fileformat">
		 <label for="node-input-fileformat"><i class="fa fa-file-image-o"></i> <span data-i18n="picamera2.label.fileformat"></span></label>
		 <select id="node-input-fileformat">
			<option value="jpeg">JPEG</option>
			<option value="png">PNG</option>
			<option value="bmp">BMP</option>
		</select>
	</div>
	<div class="form-row node-input-resolution">
		 <label for="node-input-resolution"><i class="fa fa-camera"></i> <span data-i18n="picamera2.label.resolution"></span></label>
		 <select id="node-input-resolution" value="10">
			<option value="1">320x240</option>
			<option value="2">640x480</option>
			<option value="3">800x600</option>
			<option value="4">1024x768</option>
			<option value="5">1280x720</option>
			<option value="6">1640x922</option>
			<option value="7">1640x1232</option>
			<option value="8">1920x1080</option>
			<option value="9">2592x1944</option>
			<option value="10">3280x2464 (v2 camera)</option>

	</div>
	<div class="form-row node-input-rotation">
		 <label for="node-input-rotation"><i class="fa fa-camera"></i> <span data-i18n="picamera2.label.rotation"></span></label>
		 <select style="width: 100px" id="node-input-rotation">
			<option value="0">0</option>
			<option value="90">90</option>
			<option value="180">180</option>
			<option value="270">270</option>
		</select>
	</div>
	<div id="flip" class="form-row flip-row">
		<label><i class="fa fa-repeat"></i> <span data-i18n="picamera2.label.flip"></span></label>
		<label for="node-input-fliph" style="width: 80px;"><span data-i18n="picamera2.label.hflip"></span></label>
		<select style="width: 60px" id="node-input-fliph">
			<option value="0" data-i18n="picamera2.options.no"></option>
			<option value="1" data-i18n="picamera2.options.yes"></option>
		</select>&nbsp;
		<label for="node-input-flipv" style="width: 80px;"><span data-i18n="picamera2.label.vflip"></span></label>
		<select style="width: 60px" id="node-input-flipv">
			<option value="0" data-i18n="picamera2.options.no"></option>
			<option value="1" data-i18n="picamera2.options.yes"></option>
		</select>
	</div>
	<div class="form-row">
		<label><i class="fa fa-camera"></i> <span data-i18n="picamera2.label.imageproperties"></span></label>
        
		<label for="node-input-brightness" style="width: 80px;"><span data-i18n="picamera2.label.brightness"></span></label>
		<input type="text" style="width: 60px" id="node-input-brightness" data-i18n="[placeholder]picamera2.placeholder.brightness">

		&nbsp;<label for="node-input-contrast" style="width: 80px;"><span data-i18n="picamera2.label.contrast"></span></label>
		<input type="text" style="width: 60px" id="node-input-contrast" data-i18n="[placeholder]picamera2.placeholder.contrast">
	</div>
	<div class="form-row">
		<label></label>

		<label for="node-input-sharpness" style="width: 80px;"><span data-i18n="picamera2.label.sharpness"></span></label>
		<input type="text" style="width: 60px" id="node-input-sharpness" data-i18n="[placeholder]picamera2.placeholder.sharpness">

		&nbsp;<label for="node-input-quality" style="width: 80px;"><span data-i18n="picamera2.label.quality"></span></label>
		<input type="text" style="width: 60px" id="node-input-quality" data-i18n="[placeholder]picamera2.placeholder.quality">
	</div>
   <div class="form-row node-input-iso">
		<label for="node-input-iso"><i class="fa fa-camera"></i> <span data-i18n="picamera2.label.iso"></span></label>
		<select id="node-input-iso" style="width: 100px" >
			<option value="0">auto</option>
			<option value="100">100</option>
			<option value="200">200</option>
			<option value="320">320</option>
			<option value="400">400</option>
			<option value="500">500</option>
			<option value="640">640</option>
			<option value="800">800</option>
		</select>
	</div>
   <div class="form-row node-input-exposuremode">
		<label><i class="fa fa-camera"></i> <span data-i18n="picamera2.label.presets"></span></label>

		<label for="node-input-exposuremode" style="width: 80px;"><span data-i18n="picamera2.label.exposuremode"></span></label>
		<select id="node-input-exposuremode" style="width: 212px;">
			<option value="auto">auto</option>
			<option value="manual">manual (uses ISO setting)</option>
		</select>
	</div>
	<div class="form-row">
		<label></label>

		<label for="node-input-awb" style="width: 80px;"><span data-i18n="picamera2.label.awb"></span></label>
		 <select id="node-input-awb" style="width: 212px;">
			 <option value="auto">auto</option>
			 <option value="daylight">daylight</option>
			 <option value="cloudy">cloudy</option>
			 <option value="tungsten">tungsten</option>
			 <option value="fluorescent">fluorescent</option>
			 <option value="incandescent">incandescent</option>
			 <option value="indoor">indoor</option>
		 </select>
	</div>
	<div class="form-row">
		<label for="node-input-agcwait"><i class="fa fa-camera"></i> <span data-i18n="picamera2.label.agcwait"></span></label>
		<input type="text" style="width: 100px" id="node-input-agcwait" placeholder="0.0 to 5.0" >
	</div>  
	</br>
	<div class="form-row node-input-name">
		<label for="node-input-name"><i class="fa fa-tag"></i> <span data-i18n="picamera2.label.name"></span></label>
		<input type="text" id="node-input-name" data-i18n="[placeholder]picamera2.placeholder.name" style="width: 296px;">
	</div>
</script>

<script type="text/x-red" data-help-name="picamera2-takephoto">
	<p>Takes picture using the Raspberry Pi camera module.</p>
	<p>Requires a Raspberry Pi camera module and the <b>picamera2</b> Python library (libcamera-based stack).</p>

	<h3>Inputs</h3>
		<dl class="message-properties">
			<dt class="optional">msg.filemode
				<span class="property-type">string</span>
			</dt>
			<dd>Overrides the File Mode defined in node editor. Possible file modes: "0" (buffered), "1" (default), "2" (auto).</dd>
			<dt class="optional">msg.filename
				<span class="property-type">string</span>
			</dt>
			<dd>Overrides the File Name defined in node editor.</dd>
			<dt class="optional">msg.filepath
				<span class="property-type">string</span>
			</dt>
			<dd>Overrides the File Path defined in node editor.</dd>
			<dt class="optional">msg.fileformat
				<span class="property-type">string</span>
			</dt>
			<dd>Overrides the File Format defined in node editor.</dd>
		</dl>

	<h3>Outputs</h3>
		<ol class="node-ports">
			<li>Standard output
				<dl class="message-properties">
					<dt>payload <span class="property-type">string</span></dt>
					<dd>
						<p>For filemode "0" (buffered mode), payload contains the raw image as a binary object.</p>
						<p>For filemode "1" (default) and "2" (auto file name), payload contains the fully qualified file name of the file containing the image.</p>
					</dd>
				</dl>
			</li>
		</ol>

	<h3>Details</h3>
		<p>This node uses <b>picamera2</b> (the libcamera-based replacement for the legacy picamera library) to capture still images from Raspberry Pi camera modules.</p>
		<p>The node keeps a persistent Python camera worker running in the background, so the camera stays open between captures and repeated shots are faster.</p>
		<p>File Mode indicates the operation mode, which can be:
			<ol type = "1" start = "0">
				<li>Buffered mode - the raw image will be sent to the next node(s) in <code>msg.payload</code></li>
				<li>Default - the image will be stored in a file with the specified name (extension added from File Format).</li>
				<li>Auto file name - the image will be stored in a file and its name automatically generated with a timestamp.</li>
			</ol>
		</p>
		<p>File Name defines the base name of the file (without extension) in which the node will save the photo, if File Mode is "Default". The file extension is always determined by the File Format dropdown.</p>
		<p>File Path specifies the path where photos are saved (defaults to ~/Pictures).</p>
		<p>File Format defines the format of the file. The following formats are supported: JPEG (default), PNG, BMP.</p>
		<p>Resolution, the image resolution in pixels.</p>
		<p>Rotation, rotates the image (in degrees). 0° and 180° use native libcamera transforms. 90° and 270° use a post-capture rotation (requires Pillow).</p>
		<p>Image Flip, flips image horizontally and vertically, independently.</p>
		<p>Brightness adjusts the brightness of the camera as a number from 0 to 100 (default 50). Internally mapped to the libcamera Brightness control (-1.0 to 1.0).</p>
		<p>Contrast sets the contrast level as a number from -100 to 100 (default 0). Internally mapped to the libcamera Contrast control.</p>
		<p>Sharpness adjusts the sharpness as a number from -100 to 100 (default 0). Internally mapped to the libcamera Sharpness control.</p>
		<p>Quality is used to control JPEG compression (from 0 - low quality; to 100 - high quality). Quality is ignored by all other image formats (default 80).</p>
		<p>ISO sets the apparent ISO setting. When set to auto, the camera uses automatic exposure and gain. When set to a value (100-800), it maps to the libcamera AnalogueGain control (ISO/100).</p>
		<p>Exposure mode: auto uses the camera's automatic exposure algorithm; manual disables auto-exposure and uses the ISO/gain setting.</p>
		<p>AWB mode sets the auto-white-balance mode. Available options: auto, daylight, cloudy, tungsten, fluorescent, incandescent, indoor.</p>
		<p>Wait for AGC is the delay between camera start and capture, allowing sensors to settle for proper exposure (default 1.0s).</p>

	<h3>Reference</h3>
		<ul>
			<li><a href="https://www.raspberrypi.com/documentation/computers/camera_software.html" target="_blank">Raspberry Pi Camera Software</a></li>
			<li><a href="https://datasheets.raspberrypi.com/camera/picamera2-manual.pdf" target="_blank">picamera2 Manual</a></li>
			<li><a href="https://github.com/raspberrypi/picamera2" target="_blank">picamera2 GitHub</a></li>
		</ul>
</script>

<script type="text/javascript">
	RED.nodes.registerType("picamera2-takephoto",{
		category: "Raspberry_Pi",
		color: "#A6BBCF",
		defaults: {
			filemode: {value:"1", required:true},
			autoname: {value:"image", required:false},
			filename: {value:"", required:false},
			filepath: {value:"", required:false},
			fileformat: {value:"png", required:true},
			resolution: {value:"10", required:true},
			rotation : {value:"0", required:true},
			fliph: {value:"0", required:true},
			flipv: {value:"0", required:true},
			brightness: {value:"50", required:true},
			contrast: {value:"0", required:true},
			sharpness: {value:"0", required:true},
			quality: {value:"80", required:false},
			exposuremode: {value:"auto", required:true}, 
			iso: {value:"0", required:true},
			agcwait: {value:"1.0", required:false},
			awb: {value:"auto", required:false},
			name: {value:""}
		},
		inputs:1,
		outputs:1,
		icon: "photo.png",
		oneditprepare: function() {
			function updateFileFields() {
				var mode = $("#node-input-filemode").val();
				if (mode == "0") {
					// Buffered mode — show filepath + format only
					$("#autoname").hide();
					$("#filename").hide();
					$("#filepath").show();
					$("#fileformat").show();
				} else if (mode == "2") {
					// Auto mode — show autoname, filepath, format
					$("#autoname").show();
					$("#filename").hide();
					$("#filepath").show();
					$("#fileformat").show();
				} else {
					// Default mode — show filename (no extension), filepath, format
					$("#autoname").hide();
					$("#filename").show();
					$("#filepath").show();
					$("#fileformat").show();
				}
			}
			$("#node-input-filemode").change(updateFileFields);
			updateFileFields();
		},
		label: function() {
			return this.name || "take photo node";
		}
	});
</script>
<!-- End of Picamera2 Take Photo Node -->
